services:
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb
    restart: always
    env_file: .env
    networks:
      - inception
    volumes:
      - mariadb_data:/var/lib/mysql

  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress
    restart: always
    env_file: .env
    depends_on:
      - mariadb
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/wordpress

  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    env_file: .env
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/wordpress

volumes:
  mariadb_data:
    driver_opts:
      type: none
      o: bind
      device: /home/ailbezer/data/mariadb

  wordpress_data:
    driver_opts:
      type: none
      o: bind
      device: /home/ailbezer/data/wordpress

networks:
  inception:
    driver: bridge
